services:
  redis:
    image: redis:7.4-alpine
    container_name: agentai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: agentai-kafka
    restart: unless-stopped
    ports:
      - "9094:9094"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: agentai-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  weaviate:
    image: semitechnologies/weaviate:1.29.2
    container_name: agentai-weaviate
    restart: unless-stopped
    ports:
      - "8088:8080"
      - "50051:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      QUERY_DEFAULTS_LIMIT: 20
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate

  ollama:
    image: ollama/ollama:latest
    container_name: agentai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: agentai-prometheus
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "9090:9090"
    environment:
      AGENT_API_KEY: ${AGENT_API_KEY:-changeme}
    entrypoint:
      - /bin/sh
      - -c
      - sed "s/PROMETHEUS_API_KEY_PLACEHOLDER/$${AGENT_API_KEY}/g" /etc/prometheus/prometheus.template.yml > /tmp/prometheus.yml && /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.template.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro

  grafana:
    image: grafana/grafana:11.2.2
    container_name: agentai-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: clinigraph-ai-web
    container_name: agentai-web
    restart: unless-stopped
    env_file:
      - .env.agentai.local
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OLLAMA_BASE_URL: http://ollama:11434
      WEAVIATE_HTTP_HOST: weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: weaviate
      WEAVIATE_GRPC_PORT: 50051
      # Override Windows path from .env.agentai.local with a valid container path
      DJANGO_DB_ENGINE: django.db.backends.sqlite3
      DJANGO_DB_NAME: /app/db.sqlite3
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - kafka
      - weaviate
      - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentai-frontend
    restart: unless-stopped
    environment:
      # Relative path: browser sends /api/... to Vite dev server, which proxies to Django on host.
      VITE_API_BASE_URL: /api/v1
      # Vite proxy target: host.docker.internal resolves to the host machine from inside Docker Desktop.
      VITE_DEV_API_PROXY_TARGET: http://host.docker.internal:8000
    volumes:
      # Bind mount source files so Vite HMR picks up host edits without a rebuild.
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      # Keep node_modules from the build image — do NOT mount the host's node_modules.
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  redis_data:
  frontend_node_modules:
  kafka_data:
  weaviate_data:
  ollama_data:
