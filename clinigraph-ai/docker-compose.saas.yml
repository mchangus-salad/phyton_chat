services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: clinigraph-ai-web
    container_name: clinigraph-web
    restart: unless-stopped
    env_file:
      - .env.saas.local
    ports:
      - "${WEB_EXTERNAL_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health/"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      weaviate:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: clinigraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME:-clinigraph}
      POSTGRES_USER: ${DJANGO_DB_USER:-clinigraph}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD:-clinigraph}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: clinigraph-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: clinigraph-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  weaviate:
    image: semitechnologies/weaviate:1.29.2
    container_name: clinigraph-weaviate
    restart: unless-stopped
    ports:
      - "${WEAVIATE_HTTP_EXTERNAL_PORT:-8088}:8080"
      - "${WEAVIATE_GRPC_EXTERNAL_PORT:-50051}:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      QUERY_DEFAULTS_LIMIT: 20
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate

  corpus-updater:
    image: clinigraph-ai-web
    container_name: clinigraph-corpus-updater
    restart: unless-stopped
    env_file:
      - .env.saas.local
    command: ["/bin/sh", "/app/scripts/corpus-updater-entrypoint.sh"]
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - corpus_state:/app/data/corpus_state

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  weaviate_data:
  corpus_state:
