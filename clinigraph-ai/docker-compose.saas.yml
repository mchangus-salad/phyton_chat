services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: clinigraph-ai-web
    container_name: clinigraph-web
    restart: unless-stopped
    env_file:
      - .env.saas.local
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OLLAMA_BASE_URL: http://ollama:11434
      WEAVIATE_HTTP_HOST: weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: weaviate
      WEAVIATE_GRPC_PORT: 50051
    ports:
      - "${WEB_EXTERNAL_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health/"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      weaviate:
        condition: service_started
      ollama:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: clinigraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME:-clinigraph}
      POSTGRES_USER: ${DJANGO_DB_USER:-clinigraph}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD:-clinigraph}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: clinigraph-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: clinigraph-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  weaviate:
    image: semitechnologies/weaviate:1.29.2
    container_name: clinigraph-weaviate
    restart: unless-stopped
    ports:
      - "${WEAVIATE_HTTP_EXTERNAL_PORT:-8088}:8080"
      - "${WEAVIATE_GRPC_EXTERNAL_PORT:-50051}:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      QUERY_DEFAULTS_LIMIT: 20
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate

  ollama:
    image: ollama/ollama:latest
    container_name: clinigraph-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_EXTERNAL_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: clinigraph-prometheus
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${PROMETHEUS_EXTERNAL_PORT:-9090}:9090"
    environment:
      AGENT_API_KEY: ${AGENT_API_KEY:-changeme}
    entrypoint:
      - /bin/sh
      - -c
      - sed "s/PROMETHEUS_API_KEY_PLACEHOLDER/$${AGENT_API_KEY}/g" /etc/prometheus/prometheus.template.yml > /tmp/prometheus.yml && /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.template.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro

  grafana:
    image: grafana/grafana:11.2.2
    container_name: clinigraph-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_EXTERNAL_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: clinigraph-ai-frontend
    container_name: clinigraph-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://web:8000/api/v1
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-5173}:5173"
    depends_on:
      web:
        condition: service_healthy

  corpus-updater:
    image: clinigraph-ai-web
    container_name: clinigraph-corpus-updater
    restart: unless-stopped
    env_file:
      - .env.saas.local
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OLLAMA_BASE_URL: http://ollama:11434
      WEAVIATE_HTTP_HOST: weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: weaviate
      WEAVIATE_GRPC_PORT: 50051
    command: ["/bin/sh", "/app/scripts/corpus-updater-entrypoint.sh"]
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - corpus_state:/app/data/corpus_state

  # ── Mobile API gateway (nginx) ─────────────────────────────────────────────────
  # Activate with: docker compose --profile mobile up
  mobile-gateway:
    image: nginx:1.26-alpine
    container_name: clinigraph-mobile-gateway
    restart: unless-stopped
    profiles: ["mobile"]
    ports:
      - "${MOBILE_GATEWAY_PORT:-8443}:8080"
    volumes:
      - ./infra/nginx/mobile-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  weaviate_data:
  ollama_data:
  corpus_state:
