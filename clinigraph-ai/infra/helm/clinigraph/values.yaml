# ── Global ────────────────────────────────────────────────────────────────────
global:
  # Container registry prefix (e.g. myacr.azurecr.io or 123456.dkr.ecr.us-east-1.amazonaws.com)
  imageRegistry: ""
  imageTag: "latest"
  imagePullPolicy: IfNotPresent
  # Default StorageClass. Override per-service with <service>.storage.storageClass.
  storageClass: ""

# ── Namespace ────────────────────────────────────────────────────────────────
namespace:
  create: true
  name: clinigraph

# ── Web (Django API + Gunicorn) ───────────────────────────────────────────────
web:
  replicaCount: 1
  image:
    repository: clinigraph-ai-web
    tag: ""          # Falls back to global.imageTag
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ── Frontend (React → Nginx) ─────────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: clinigraph-ai-frontend
    tag: ""
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: clinigraph.example.com
  tls:
    enabled: false
    secretName: clinigraph-tls

# ── App Config (non-sensitive) ────────────────────────────────────────────────
config:
  django:
    debug: "false"
    allowedHosts: "*"
    logLevel: "INFO"
    gunicornWorkers: "2"
    gunicornTimeout: "120"
    dbEngine: "django.db.backends.postgresql"
  agent:
    llmProvider: "ollama"
    llmModel: "llama3.1:8b"
    embeddingsProvider: "ollama"
    embeddingsModel: "nomic-embed-text"
    vectorDbProvider: "weaviate"
    maxContextDocs: "4"
    cacheTtlSeconds: "300"
    kafkaTopic: "agent-events"

# ── Secrets (generated by deploy.ps1 for dev; pre-created Secret for prod) ───
secrets:
  # If set, all secrets are read from this existing Kubernetes Secret.
  # The Secret must contain the keys listed below.
  existingSecret: ""
  # Values used when existingSecret is empty (deploy.ps1 generates them for dev).
  djangoSecretKey: ""
  agentApiKey: ""
  postgresPassword: ""
  grafanaAdminPassword: "admin"
  jwtAccessMinutes: "30"
  jwtRefreshDays: "7"

# ── PostgreSQL (in-cluster – disabled for prod when using managed DB) ─────────
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    database: clinigraph
    username: clinigraph
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# ── External Database (managed cloud DB – set enabled=true for prod) ──────────
externalDatabase:
  enabled: false
  host: ""
  port: 5432
  database: clinigraph
  username: clinigraph
  # password comes from secrets.postgresPassword

# ── Redis (in-cluster – disabled for prod when using managed cache) ───────────
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.4-alpine"
  storage:
    size: 2Gi
    storageClass: ""
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── External Redis (managed cloud cache – set enabled=true for prod) ──────────
externalRedis:
  enabled: false
  url: ""   # redis://host:6379/0  or  rediss://host:6380/0 for TLS

# ── Kafka (always in-cluster; use Confluent Cloud for large-scale prod) ───────
kafka:
  enabled: true
  image:
    repository: confluentinc/cp-kafka
    tag: "7.8.0"
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

# ── Weaviate (vector store – always in-cluster) ───────────────────────────────
weaviate:
  enabled: true
  image:
    repository: semitechnologies/weaviate
    tag: "1.29.2"
  storage:
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

# ── Ollama (LLM inference – always in-cluster for local Ollama strategy) ─────
ollama:
  enabled: true
  image:
    repository: ollama/ollama
    tag: "latest"
  storage:
    size: 60Gi      # llama3.1:8b ≈ 5 GB + nomic-embed-text ≈ 0.3 GB + headroom
    storageClass: ""
  resources:
    requests:
      cpu: "1000m"
      memory: "6Gi"
    limits:
      cpu: "4000m"
      memory: "12Gi"
  models:
    - llama3.1:8b
    - nomic-embed-text
  # To use GPU-enabled nodes, add a nodeSelector / toleration here.
  nodeSelector: {}
  tolerations: []

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v2.54.1"
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "11.2.2"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── Seed Job ─────────────────────────────────────────────────────────────────
seed:
  enabled: true
  # K8s removes the job pod after this many seconds once it finishes.
  ttlAfterFinished: 600
  # activeDeadlineSeconds – model downloads can take up to 90 minutes on cold nodes
  activeDeadlineSeconds: 7200
  domains:
    - cardiology
    - endocrinology
    - gastroenterology
    - hematology
    - infectious_diseases
    - neurology
    - oncology
    - pulmonology
    - rheumatology
  pullOllamaModels: true
