apiVersion: v1
kind: Service
metadata:
  name: {{ include "clinigraph.fullname" . }}-web
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "clinigraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "clinigraph.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
