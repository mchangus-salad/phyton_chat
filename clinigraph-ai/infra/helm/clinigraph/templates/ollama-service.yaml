{{- if .Values.ollama.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clinigraph.fullname" . }}-ollama
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "clinigraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: http
  selector:
    {{- include "clinigraph.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
{{- end }}
