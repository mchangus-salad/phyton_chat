{{- if .Values.weaviate.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clinigraph.fullname" . }}-weaviate
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "clinigraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: weaviate
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 50051
      targetPort: 50051
      protocol: TCP
      name: grpc
  selector:
    {{- include "clinigraph.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: weaviate
{{- end }}
