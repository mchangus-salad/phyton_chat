apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clinigraph.fullname" . }}-web
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "clinigraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "clinigraph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "clinigraph.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: {{ include "clinigraph.image" (dict "global" .Values.global "image" .Values.web.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "clinigraph.fullname" . }}-config
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clinigraph.secretName" . }}
                  key: DJANGO_SECRET_KEY
            - name: AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clinigraph.secretName" . }}
                  key: AGENT_API_KEY
            - name: DJANGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clinigraph.secretName" . }}
                  key: DJANGO_DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /api/v1/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
