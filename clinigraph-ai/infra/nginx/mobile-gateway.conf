# CliniGraph AI — Mobile API Gateway
# Nginx reverse proxy for iOS / Android clients.
# Activated via Docker profile "mobile":
#   docker compose --profile mobile up

# ── Rate limiting zones ───────────────────────────────────────────────────────
# 10 req/s burst per IP (mobile clients may spike slightly on app resume)
limit_req_zone $binary_remote_addr zone=mobile_per_ip:10m rate=10r/s;
# 60 req/s aggregate across all mobile clients
limit_req_zone $server_name zone=mobile_global:1m rate=60r/s;

upstream clinigraph_web {
    server web:8000;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          DENY               always;
    add_header X-Content-Type-Options   nosniff            always;
    add_header X-XSS-Protection         "1; mode=block"    always;
    add_header Referrer-Policy          "no-referrer"      always;
    add_header Cache-Control            "no-store"         always;

    # Strip internal headers that clients must not forge
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header Host               $host;

    # ── Timeouts suitable for mobile (LTE / Wi-Fi with intermittent signal) ──
    proxy_connect_timeout   15s;
    proxy_send_timeout      60s;
    proxy_read_timeout      90s;

    # ── Mobile API endpoints ──────────────────────────────────────────────────
    location /api/v1/mobile/ {
        limit_req zone=mobile_per_ip  burst=20  nodelay;
        limit_req zone=mobile_global  burst=100 nodelay;

        # Max upload size for patient case documents (PDF/TXT ≤ 20 MB)
        client_max_body_size 20m;

        proxy_pass          http://clinigraph_web;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
    }

    # Block all other paths — mobile gateway is narrow-purpose
    location / {
        return 404;
    }
}
